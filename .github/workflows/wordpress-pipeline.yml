name: "Community Server - Deploy Wordpress"

on:
  workflow_dispatch:

jobs:
  deploy-ml-services:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KNOWN_HOSTS_COMMUNITY }}" >> ~/.ssh/known_hosts
          echo "${{ secrets.SSH_PRIVATE_KEY_COMMUNITY }}" >> ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy Wordpress and Databases
        env:
          TRAEFIK_DOMAIN: urbanairlab.hn

          MYSQL_DATABASE: "${{ secrets.MYSQL_DATABASE }}"
          MYSQL_USER: "${{ secrets.MYSQL_USER }}"
          MYSQL_PASSWORD: "${{ secrets.MYSQL_PASSWORD }}"
          MYSQL_ROOT_PASSWORD: "${{ secrets.MYSQL_ROOT_PASSWORD }}"

          DOCKER_BUILDKIT: 0
          COMPOSE_DOCKER_CLI_BUILD: 0
        run: |
          docker -H ssh://root@urbanairlab.hn compose -f docker-compose-wp.yaml rm -f -s -v
          docker -H ssh://root@urbanairlab.hn compose -f docker-compose-wp.yaml up -d --pull always

      - name: Delete Credentials
        run: |
            ssh root@urbanairlab.hn "rm -rf /opt/ual/configs/mlflow"

          
          
